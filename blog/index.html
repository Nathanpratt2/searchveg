---
layout: blog_layout
title: The SearchVeg Blog
---

<h1>Latest Articles</h1>
<p style="color: var(--text-muted); margin-bottom: 40px;">Tips, tricks, and highlights from the vegan cooking world.</p>

<div style="display: flex; flex-direction: column; gap: 30px;">
    <!-- This loop automatically grabs all your posts! -->
    {% for post in site.posts %}
    <article style="border-bottom: 1px solid var(--input-border); padding-bottom: 20px;">
        <h2 style="margin: 0 0 10px 0; font-size: 1.5em;">
            <a href="{{ post.url }}" style="text-decoration: none; color: var(--text-color);">{{ post.title }}</a>
        </h2>
        <span style="color: var(--text-muted); font-size: 0.9em;">{{ post.date | date: "%B %d, %Y" }}</span>
        <p style="margin-top: 10px; color: var(--text-color);">{{ post.excerpt | strip_html | truncatewords: 35 }}...</p>
        <a href="{{ post.url }}" style="font-weight: bold; text-decoration: none;">Read more &rarr;</a>
    </article>
    {% endfor %}
</div>
