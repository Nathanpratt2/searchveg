<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SearchVeg</title>
    
    <!-- IMPORTANT: The slash before style.css ensures it finds the CSS from anywhere -->
    <link rel="stylesheet" href="/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/logo.png" type="image/png">

    <style>
        /* Specific styles just for reading articles nicely */
        .blog-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .blog-wrapper h1, .blog-wrapper h2, .blog-wrapper h3 {
            color: var(--accent-color);
        }
        .blog-wrapper p {
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .blog-wrapper img {
            width: 100%;
            aspect-ratio: 16 / 9; /* Forces all images to be the exact same rectangle shape */
            object-fit: cover; /* Crops the image perfectly so it NEVER looks squished or stretched */
            border-radius: 12px;
            margin: 30px 0;
            box-shadow: 0 4px 10px var(--shadow-color);
            display: block;
            background-color: white; /* Adds a nice background if the image has transparent parts */
        }
        .blog-wrapper a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .blog-date {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 30px;
            display: block;
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="/index.html" class="nav-brand-link logo-link">
        <img src="/default.png?v=2" alt="SearchVeg Logo" class="nav-logo" id="navLogoImg">
    </a>
    <div class="nav-links" id="navLinks">
        <a href="/index.html">Find a Recipe</a>
        <a href="/blog/" class="active-nav">Blog</a>
        <a href="/about/">About</a>
        <a href="/privacy/">Privacy</a>
    </div>
</nav>

<main class="blog-wrapper">
    <!-- This is the magic tag where Jekyll injects your blog text -->
    {{ content }}
</main>

<footer>
    <p>SearchVeg brings together the best plant-based cooking.</p>
</footer>

<script>
    // Keep dark mode working on the blog
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('navLogoImg').src = '/default_darkmode.png?v=2';
    }
</script>
</body>
</html>
