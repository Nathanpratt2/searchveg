<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SearchVeg</title>
    
    <!-- CSS & Fonts -->
    <link rel="stylesheet" href="https://searchveg.com/style.css?v={{ site.time | date: '%s' }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://searchveg.com/logo.png" type="image/png">

    <style>
        /* Specific styles just for reading articles nicely */
        .blog-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .blog-wrapper h1, .blog-wrapper h2, .blog-wrapper h3 {
            color: var(--accent-color);
        }
        .blog-wrapper p {
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .blog-wrapper img {
            max-width: 100%;
            max-height: 450px; 
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 30px auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
            background-color: white; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .blog-wrapper a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .blog-date {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 30px;
            display: block;
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="https://searchveg.com/index.html" class="nav-brand-link logo-link">
        <img src="https://searchveg.com/default.png?v=2" alt="SearchVeg Logo" class="nav-logo" id="navLogoImg">
    </a>
    
    <div class="nav-links" id="navLinks">
        <a href="https://searchveg.com/index.html">Find a Recipe</a>
        <a href="https://searchveg.com/blog/" class="active-nav">Blog</a>
        <a href="https://searchveg.com/about/">About</a>
        <a href="https://searchveg.com/privacy/">Privacy</a>
    </div>

    <!-- NEW: The Hamburger Button was missing here! -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle Menu">☰</button>
</nav>

<main class="blog-wrapper">
    <!-- This is the magic tag where Jekyll injects your blog text -->
    <h1 style="color: var(--accent-color); margin-bottom: 5px; font-size: 2.2em; line-height: 1.2;">{{ page.title }}</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95em;">
            <strong>By: {{ page.author | default: "SearchVeg" }}</strong> | {{ page.date | date: "%B %d, %Y" }}
        </p>
        
        {{ content }}
</main>

<footer>
    <p>SearchVeg brings together the best plant-based cooking.</p>
</footer>

<script>
    // 1. Dark Mode Logic
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('navLogoImg').src = 'https://searchveg.com/default_darkmode.png?v=2';
    }

    // 2. NEW: Navigation Logic (Required for mobile menu to open)
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const navLinks = document.getElementById('navLinks');
    
    if(hamburgerBtn && navLinks) {
        hamburgerBtn.addEventListener('click', function() {
            navLinks.classList.toggle('active');
            this.innerText = this.innerText === '☰' ? '✕' : '☰';
        });
    }
</script>
</body>
</html>
