<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SearchVeg</title>
    
    <!-- FIX: Using the full URL ensures this works even deep inside blog folders -->
    <link rel="stylesheet" href="https://searchveg.com/style.css?v=1.6">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://searchveg.com/logo.png" type="image/png">

    <style>
        /* Specific styles just for reading articles nicely */
        .blog-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .blog-wrapper h1, .blog-wrapper h2, .blog-wrapper h3 {
            color: var(--accent-color);
        }
        .blog-wrapper p {
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .blog-wrapper img {
            max-width: 100%;
            max-height: 450px; 
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 30px auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
            background-color: white; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .blog-wrapper a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .blog-date {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 30px;
            display: block;
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="https://searchveg.com/index.html" class="nav-brand-link logo-link">
        <img src="https://searchveg.com/default.png?v=2" alt="SearchVeg Logo" class="nav-logo" id="navLogoImg">
    </a>
    <div class="nav-links" id="navLinks">
        <a href="https://searchveg.com/index.html">Find a Recipe</a>
        <a href="https://searchveg.com/blog/" class="active-nav">Blog</a>
        <a href="https://searchveg.com/about/">About</a>
        <a href="https://searchveg.com/privacy/">Privacy</a>
    </div>
</nav>

<main class="blog-wrapper">
    <!-- This is the magic tag where Jekyll injects your blog text -->
    {{ content }}
</main>

<footer>
    <p>SearchVeg brings together the best plant-based cooking.</p>
</footer>

<script>
    // Keep dark mode working on the blog
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        // FIX: Use full URL for the dark mode logo too
        document.getElementById('navLogoImg').src = 'https://searchveg.com/default_darkmode.png?v=2';
    }
</script>
</body>
</html>
