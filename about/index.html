<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About SearchVeg</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- THE NEW NAVIGATION -->
    <nav class="main-nav">
    <a href="/" class="nav-brand-link">
        <!-- Notice the / in front of default.png so it works on all pages -->
        <img src="/default.png" alt="SearchVeg Logo" class="nav-logo">
    </a>
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation">☰</button>
    <div class="nav-links" id="navLinks">
        <a href="/">Search Recipes</a>
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
        <a href="/privacy/">Privacy</a>
    </div>
</nav>
    <div style="padding: 50px; text-align: center;">
        <h1>About SearchVeg</h1>
        <p>This page is currently under construction!</p>
        <a href="/">Go back to the search engine</a>
    </div>

    <!-- THE JAVASCRIPT FOR THE MOBILE MENU -->
    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');
        
        if(hamburgerBtn && navLinks) {
            hamburgerBtn.addEventListener('click', function() {
                navLinks.classList.toggle('active');
                this.innerText = this.innerText === '☰' ? '✕' : '☰';
            });
        }
    </script>
</body>
</html>
